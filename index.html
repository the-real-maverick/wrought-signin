  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"050b6d6a-131a-4ca3-b96b-3e92e792a00d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bd92b41f-ddec-48ee-9042-7a690bb05eec\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"4ddaa717-6271-4717-8a11-180279c57e92\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d04ce371-83de-40b8-a333-6805e9de8702\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"0c291782-ca4d-4251-8401-a8e5b765a976\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d24d1b25-51f0-4b84-b8cf-9f9bf2d03798\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"050b6d6a-131a-4ca3-b96b-3e92e792a00d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --void:     #040506;\n    --graphite: #0a0b0c;\n    --iron:     #14161a;\n    --bone:     #d8d4cb;\n    --bone-hi:  #ece8de;\n    --ash:      #6c7178;\n    --brass:    #ac8a57;\n    --brass-hi: #caa370;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { height: 100%; background: var(--void); }\n  body {\n    font-family: 'Inter Tight', system-ui, sans-serif;\n    color: var(--bone);\n    overflow: hidden;\n    -webkit-font-smoothing: antialiased;\n    letter-spacing: 0.005em;\n  }\n\n  /* ============================================================\n     SINGLE BACKGROUND GESTURE — one raking light on black steel\n     ============================================================ */\n  .stage {\n    position: fixed; inset: 0;\n    background: var(--void);\n    overflow: hidden;\n  }\n  #forge {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    display: block;\n  }\n  .vignette {\n    position: absolute; inset: 0;\n    pointer-events: none;\n    background:\n      radial-gradient(120% 90% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 82%, #000 100%);\n    mix-blend-mode: multiply;\n  }\n  .grain {\n    position: absolute; inset: 0;\n    pointer-events: none;\n    opacity: 0.05;\n    mix-blend-mode: overlay;\n    background-image: url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxODAnIGhlaWdodD0nMTgwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45NScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHZhbHVlcz0nMCAwIDAgMCAxICAwIDAgMCAwIDEgIDAgMCAwIDAgMSAgMCAwIDAgMC41NSAwJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoJTIzbiknLz48L3N2Zz4=\");\n  }\n\n  /* ============================================================\n     COMPOSITION — asymmetric, architectural grid\n     the page is divided into a 12-column grid with a fixed\n     left margin rail. the wordmark anchors top-left, the\n     login sits in the lower-left, a studio index sits top-right.\n     nothing is centered; everything keys to the rail.\n     ============================================================ */\n  .chrome {\n    position: relative;\n    z-index: 2;\n    height: 100vh; height: 100dvh;\n    width: 100%;\n    display: grid;\n    grid-template-columns:\n      clamp(32px, 6vw, 96px)               /* left rail */\n      1fr                                  /* body */\n      clamp(32px, 6vw, 96px);              /* right rail */\n    grid-template-rows:\n      clamp(28px, 4vh, 48px)\n      auto\n      1fr\n      auto\n      clamp(28px, 4vh, 48px);\n  }\n\n  /* thin ruled baseline across the middle of the page */\n  .chrome::before {\n    content: '';\n    position: absolute;\n    left: clamp(32px, 6vw, 96px);\n    right: clamp(32px, 6vw, 96px);\n    top: 50%;\n    height: 1px;\n    background: rgba(216, 212, 203, 0.06);\n    pointer-events: none;\n  }\n\n  /* --- top plaque: wordmark left, studio index right --- */\n  .plaque-l {\n    grid-column: 2 / 3;\n    grid-row: 2 / 3;\n    display: flex;\n    align-items: baseline;\n    gap: 14px;\n  }\n  .plaque-r {\n    grid-column: 2 / 3;\n    grid-row: 2 / 3;\n    justify-self: end;\n    align-self: baseline;\n    text-align: right;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: rgba(216, 212, 203, 0.30);\n    line-height: 1;\n  }\n  .plaque-r .ix { color: var(--brass); }\n\n  .wordmark {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 500;\n    /* authority: larger, tighter, with a faint ink presence */\n    font-size: clamp(30px, 2.6vw, 38px);\n    line-height: 1;\n    letter-spacing: -0.01em;\n    color: var(--bone-hi);\n    text-align: left;\n    white-space: nowrap;\n    position: relative;\n    text-shadow: 0 0 30px rgba(0,0,0,0.6);\n  }\n  .wordmark em {\n    font-family: 'JetBrains Mono', monospace;\n    font-style: normal;\n    font-weight: 400;\n    font-size: 9.5px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: rgba(216,212,203, 0.46);\n    margin-left: 10px;\n    vertical-align: 5px;\n  }\n  .wordmark::after { content: none; }\n\n  .plaque-l .dash {\n    width: 18px; height: 1px;\n    background: var(--brass);\n    align-self: center;\n    display: inline-block;\n    margin-top: -2px;\n  }\n  .plaque-l .kicker {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9.5px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: rgba(216, 212, 203, 0.34);\n  }\n\n  /* --- headline block: large serif statement, bottom-left, key to the rail --- */\n  .statement {\n    grid-column: 2 / 3;\n    grid-row: 3 / 4;\n    align-self: end;\n    max-width: 14ch;\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 400;\n    font-style: italic;\n    font-size: clamp(40px, 6vw, 84px);\n    line-height: 0.95;\n    letter-spacing: -0.015em;\n    color: rgba(236, 232, 222, 0.78);\n    text-wrap: pretty;\n    margin-bottom: clamp(32px, 5vh, 56px);\n  }\n  .statement .pl { color: var(--brass-hi); font-style: normal; font-family: 'JetBrains Mono', monospace; font-size: 0.18em; letter-spacing: 0.3em; vertical-align: 0.55em; margin-right: 6px; text-transform: uppercase; }\n\n  /* --- login plate: machined recess inset into the steel, not a floating card ---\n     Strategy: a subtle darkened cut-out (recess) behind the form gives the\n     form a seat; a single brass hairline seam runs the full height on the\n     LEFT edge, establishing orientation (as though the plate was pressed\n     into the steel from the right and the seam is where it meets the face).\n     A soft contact shadow below integrates it with the base field.\n     No corner brackets — they were reading as UI chrome. */\n  .plate {\n    grid-column: 2 / 3;\n    grid-row: 4 / 5;\n    justify-self: end;\n    width: min(380px, 100%);\n    position: relative;\n    /* padding: extra left padding so the form content clears the seam + recess edge */\n    padding: 30px 4px 22px 34px;\n    /* inset recess: a faint darker field behind the form, masked so the\n       recess dissolves into the plate at its RIGHT edge (no boxed look).\n       The mask-image feathers the right side. */\n    background:\n      radial-gradient(140% 120% at 20% 30%, rgba(0,0,0,0.46), rgba(0,0,0,0.18) 55%, rgba(0,0,0,0) 100%);\n    -webkit-mask-image: linear-gradient(to right, #000 0%, #000 72%, rgba(0,0,0,0.7) 92%, rgba(0,0,0,0) 100%);\n            mask-image: linear-gradient(to right, #000 0%, #000 72%, rgba(0,0,0,0.7) 92%, rgba(0,0,0,0) 100%);\n  }\n  /* wrapper to hold form contents above the mask on the plate — but since\n     the mask affects background only via the plate div, we instead apply\n     shadow via a separate inner layer so the contact shadow isn't masked. */\n  /* brass seam — runs the full height on the LEFT edge of the plate.\n     This is the single integration mark: the seam where the plate meets\n     the steel. Gradient fade at top/bottom so it doesn't read as a box. */\n  .plate::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 14px; bottom: 14px;\n    width: 1px;\n    background: linear-gradient(\n      to bottom,\n      rgba(202,163,112, 0) 0%,\n      rgba(202,163,112, 0.55) 18%,\n      rgba(226, 182, 130, 0.82) 50%,\n      rgba(202,163,112, 0.55) 82%,\n      rgba(202,163,112, 0) 100%\n    );\n  }\n  /* a second hairline just inside the seam, darker — reads as the recess cut */\n  .plate::after {\n    content: '';\n    position: absolute;\n    left: 4px; top: 0; bottom: 0;\n    width: 1px;\n    background: linear-gradient(\n      to bottom,\n      rgba(0,0,0, 0) 0%,\n      rgba(0,0,0, 0.55) 20%,\n      rgba(0,0,0, 0.55) 80%,\n      rgba(0,0,0, 0) 100%\n    );\n  }\n\n  /* --- form --- */\n  form {\n    width: 100%;\n    display: flex; flex-direction: column;\n    gap: 0;\n  }\n\n  /* each field sits in its own machined slot, divided by a hairline */\n  .field {\n    display: grid;\n    grid-template-columns: 64px 1fr;\n    align-items: center;\n    gap: 16px;\n    padding: 18px 2px;\n    border-bottom: 1px solid rgba(216, 212, 203, 0.08);\n    position: relative;\n  }\n  .field::after {\n    /* focus underline, slides in brass */\n    content: '';\n    position: absolute;\n    left: 0; right: 0; bottom: -1px;\n    height: 1px;\n    background: linear-gradient(90deg, var(--brass), var(--brass-hi));\n    transform: scaleX(0);\n    transform-origin: left center;\n    transition: transform 460ms cubic-bezier(.2,.7,.2,1);\n  }\n  .field:focus-within::after { transform: scaleX(1); }\n\n  .field label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: rgba(216, 212, 203, 0.52);\n  }\n  .field input {\n    all: unset;\n    display: block;\n    width: 100%;\n    font-family: 'Inter Tight', sans-serif;\n    font-size: 16px;\n    font-weight: 400;\n    color: #ECE8DE;\n    letter-spacing: 0.005em;\n    caret-color: var(--brass-hi);\n  }\n  .field input::placeholder { color: rgba(140, 144, 150, 0.56); }\n\n  /* --- primary action: engraved inscription, not button furniture ---\n     A brass hairline rule runs the full width of the form region as a\n     top boundary; below it, \"sign in\" is set in italic Cormorant (the\n     brand voice), followed by a hairline separator and a mono ENTER\n     hint. Hovering the whole region brightens the rule progressively\n     from left (seam side) to right. */\n  .submit {\n    all: unset;\n    cursor: pointer;\n    display: block;\n    width: 100%;\n    padding: 22px 2px 0;\n    position: relative;\n    color: rgba(236, 232, 222, 0.92);\n  }\n  .submit .rule {\n    display: block;\n    height: 1px;\n    width: 100%;\n    position: relative;\n    background: linear-gradient(90deg,\n      rgba(202,163,112, 0.55) 0%,\n      rgba(202,163,112, 0.30) 55%,\n      rgba(202,163,112, 0.10) 100%);\n    margin-bottom: 16px;\n  }\n  .submit .rule::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(90deg,\n      rgba(232,190,134, 0.95) 0%,\n      rgba(232,190,134, 0.55) 60%,\n      rgba(232,190,134, 0) 100%);\n    opacity: 0;\n    transition: opacity 420ms cubic-bezier(.2,.7,.2,1);\n  }\n  .submit .inscription {\n    display: flex;\n    align-items: baseline;\n    gap: 14px;\n    font-family: 'Cormorant Garamond', serif;\n  }\n  .submit .verb {\n    font-style: italic;\n    font-weight: 500;\n    font-size: 24px;\n    letter-spacing: 0.005em;\n    color: #ECE8DE;\n    line-height: 1;\n    white-space: nowrap;\n    transition: color 320ms;\n  }\n  .submit .sep {\n    flex: 1;\n    height: 1px;\n    background: rgba(216, 212, 203, 0.14);\n    transform: translateY(-4px);\n  }\n  .submit .hint {\n    font-family: 'JetBrains Mono', monospace;\n    font-style: normal;\n    font-size: 9.5px;\n    letter-spacing: 0.34em;\n    text-transform: uppercase;\n    color: rgba(202,163,112, 0.68);\n    transition: color 320ms;\n  }\n  .submit:hover .rule::after { opacity: 1; }\n  .submit:hover .verb   { color: #F3EEE2; }\n  .submit:hover .hint   { color: var(--brass-hi); }\n  .submit:focus-visible { outline: 1px solid rgba(202,163,112, 0.5); outline-offset: 6px; }\n\n  @media (prefers-reduced-motion: reduce) {\n    #forge { opacity: 1; }\n  }\n\n  @media (max-width: 520px) {\n    .col { gap: 44px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"stage\" aria-hidden=\"true\">\n  <canvas id=\"forge\"><\u002Fcanvas>\n  <div class=\"vignette\"><\u002Fdiv>\n  <div class=\"grain\"><\u002Fdiv>\n<\u002Fdiv>\n\n<main class=\"chrome\">\n  <header class=\"plaque-l\">\n    <span class=\"wordmark\">Wrought<em>development<\u002Fem><\u002Fspan>\n  <\u002Fheader>\n\n  <aside class=\"plaque-r\" aria-hidden=\"true\">\n    <span class=\"ix\">№<\u002Fspan>&nbsp;0043 · Σ\n  <\u002Faside>\n\n  <div class=\"plate\">\n    <form id=\"signin\" novalidate=\"\">\n      <div class=\"field\">\n        <label for=\"email\">addr<\u002Flabel>\n        <input id=\"email\" type=\"email\" autocomplete=\"email\" placeholder=\"name@wrought.dev\" required=\"\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <label for=\"pass\">key<\u002Flabel>\n        <input id=\"pass\" type=\"password\" autocomplete=\"current-password\" placeholder=\"••••••••••\" required=\"\">\n      <\u002Fdiv>\n\n      <button class=\"submit\" type=\"submit\">\n        <span class=\"rule\" aria-hidden=\"true\"><\u002Fspan>\n        <span class=\"inscription\">\n          <em class=\"verb\">sign in<\u002Fem>\n          <span class=\"sep\" aria-hidden=\"true\"><\u002Fspan>\n          <span class=\"hint\" aria-hidden=\"true\">press ⏎<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<script>\n/* ============================================================================\n   WROUGHT · MATERIAL FIELD  (live, continuously animated)\n   -------\n   A sculptural rendering that fuses three continuously-moving layers:\n\n   1) A per-pixel base tone field (graphite / blackened metal) with slow\n      subsurface warmth AND an independently roaming secondary warmth blob.\n      Pixel-level grain scrolls slowly, so the surface is never frozen.\n\n   2) A horizontal stratum system whose y-positions are perturbed by a\n      slow undulation wave traveling continuously across x. Strata bend\n      and tighten around a migrating focal zone (60-90s orbit).\n\n   3) A single VERTICAL brass seam passing through the focal center,\n      perpendicular to the strata — the branded focal gesture.\n      Breathing intensity independent of focal drift.\n\n   All motion is time-based (no pointer required). The pointer adds a\n   small (<4%W) critically-damped additive drift.\n============================================================================ */\n(() => {\n  const canvas = document.getElementById('forge');\n  const ctx = canvas.getContext('2d', { alpha: false });\n\n  const BASE_W = 360;\n  let BASE_H = 220;\n\n  const off = document.createElement('canvas');\n  off.width = BASE_W; off.height = BASE_H;\n  const octx = off.getContext('2d', { willReadFrequently: true });\n  let img;\n\n  let W = 0, H = 0, DPR = 1;\n  function size() {\n    DPR = Math.min(window.devicePixelRatio || 1, 1.25);\n    W = window.innerWidth; H = window.innerHeight;\n    canvas.width = Math.floor(W * DPR);\n    canvas.height = Math.floor(H * DPR);\n    canvas.style.width = W + 'px';\n    canvas.style.height = H + 'px';\n    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n    BASE_H = Math.max(160, Math.round(BASE_W * (H / W)));\n    off.height = BASE_H;\n    img = octx.createImageData(BASE_W, BASE_H);\n  }\n  size();\n  window.addEventListener('resize', size);\n\n  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n  let running = true;\n  document.addEventListener('visibilitychange', () => {\n    running = !document.hidden;\n    if (running) requestAnimationFrame(frame);\n  });\n\n  // pointer — critically damped, small additive influence\n  let tPX = 0, tPY = 0, pX = 0, pY = 0;\n  window.addEventListener('pointermove', (e) => {\n    tPX = (e.clientX / W) * 2 - 1;\n    tPY = (e.clientY / H) * 2 - 1;\n  }, { passive: true });\n\n  // focal center — now orbits on a 75-second Lissajous path so the\n  // zone is continuously traveling. Anchored in the left-center quadrant.\n  function focalCenter(T) {\n    // Faster orbit so drift is clearly perceivable within seconds.\n    const ax = T * (2 * Math.PI / 38);        // ~38s primary period\n    const ay = T * (2 * Math.PI / 57);        // ~57s secondary — non-commensurate\n    const fx = 0.34 + 0.14 * Math.sin(ax)       + 0.05 * Math.sin(ay * 1.4) + pX * 0.022;\n    const fy = 0.55 + 0.10 * Math.cos(ay + 0.6) + 0.04 * Math.sin(ax * 0.7) + pY * 0.014;\n    return { fx, fy };\n  }\n\n  // A second, independent warmth blob roaming the field on a different path.\n  // This gives the tone layer its own life separate from the main focal zone.\n  function secondaryCenter(T) {\n    const a = T * (2 * Math.PI / 140);\n    const b = T * (2 * Math.PI / 91);\n    const sx = 0.68 + 0.22 * Math.sin(a);\n    const sy = 0.38 + 0.18 * Math.cos(b + 0.9);\n    return { sx, sy };\n  }\n\n  function tone(cold, warm, peak) {\n    const baseR = 6 + cold * 38;\n    const baseG = 7 + cold * 40;\n    const baseB = 9 + cold * 44;\n    const wR = warm * 58;\n    const wG = warm * 22;\n    const wB = warm * 4;\n    const pR = peak * 120;\n    const pG = peak * 118;\n    const pB = peak * 108;\n    return [\n      Math.min(255, baseR + wR + pR),\n      Math.min(255, baseG + wG + pG),\n      Math.min(255, baseB + wB + pB),\n    ];\n  }\n\n  function hash(x, y) {\n    const s = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;\n    return s - Math.floor(s);\n  }\n\n  function renderBase(T, fx, fy, sx, sy) {\n    const data = img.data;\n    const Wb = BASE_W, Hb = BASE_H;\n\n    const breath = 1 + 0.32 * Math.sin(T * 2 * Math.PI / 7);   // ~7s breath, stronger\n    const ambBreath = 1 + 0.22 * Math.sin(T * 2 * Math.PI / 17); // slower ambient\n\n    // Raking light sweep — a wide, soft bright band that slowly travels\n    // horizontally across the whole field. Reads as atmospheric light\n    // moving over the plate and gives global, always-visible motion.\n    const rakePhase = (T * 2 * Math.PI / 23) % (2 * Math.PI);  // ~23s traverse\n    const rakeX = 0.5 + 0.6 * Math.sin(rakePhase);             // -0.1..1.1\n    const rakeW = 0.42;                                        // width of the band\n\n    const czRx = 0.42, czRy = 0.32;\n    const scRx = 0.50, scRy = 0.40;   // secondary: larger, very soft\n\n    // grain scroll phase — faster so microstructure is visibly live\n    const grainShift = (T * 4.2) % 100000;\n\n    for (let y = 0; y < Hb; y++) {\n      const ny = y / Hb;\n      const grain1 = Math.sin(ny * Hb * 0.20 + Math.sin(ny * 5.5 + T * 0.08) * 0.5);\n      const grain2 = Math.sin(ny * Hb * 1.15 + T * 0.15);\n\n      for (let x = 0; x < Wb; x++) {\n        const nx = x / Wb;\n\n        // primary focal zone\n        const ddx = (nx - fx) / czRx;\n        const ddy = (ny - fy) / czRy;\n        const focal = Math.max(0, 1 - Math.sqrt(ddx * ddx + ddy * ddy));\n        const focal2 = focal * focal;\n\n        // secondary roaming warmth/cold blob\n        const sdx = (nx - sx) / scRx;\n        const sdy = (ny - sy) / scRy;\n        const sec = Math.max(0, 1 - Math.sqrt(sdx * sdx + sdy * sdy));\n        const sec2 = sec * sec;\n\n        const edgeX = Math.abs(nx - 0.5) * 2;\n        const edgeY = Math.abs(ny - 0.5) * 2;\n        const oxid  = Math.pow(Math.max(edgeX, edgeY), 2.4) * 0.13;\n\n        const topDim    = Math.pow(1 - ny, 3.2) * 0.045;\n        const bottomDim = Math.pow(ny, 3.0) * 0.035;\n\n        // scrolling micro-noise — stronger so the surface visibly shimmers\n        const g = (hash(x * 2.1 + grainShift, y * 3.7 - grainShift * 0.6) - 0.5) * 0.045;\n\n        // raking-light contribution (wide, soft band traveling in x)\n        const rd = (nx - rakeX) / rakeW;\n        const rake = Math.max(0, 1 - rd * rd);     // 0..1, quadratic falloff\n        const rakeLift = rake * rake * 0.12;       // up to +0.12 cold\n\n        let cold = 0.46\n                  + focal2 * 0.18\n                  + sec2   * 0.06 * ambBreath\n                  + rakeLift\n                  - grain1 * 0.020\n                  - grain2 * 0.011\n                  - oxid\n                  - topDim\n                  - bottomDim\n                  + g;\n        if (cold < 0) cold = 0;\n        if (cold > 1) cold = 1;\n\n        const heatCore = Math.max(0, focal2 - 0.42) * 2.0 * breath;\n        let warm = heatCore;\n        if (warm > 1) warm = 1;\n\n        const peak = 0;\n\n        const [r, gC, bC] = tone(cold, warm, peak);\n        const i = (y * Wb + x) * 4;\n        data[i    ] = r;\n        data[i + 1] = gC;\n        data[i + 2] = bC;\n        data[i + 3] = 255;\n      }\n    }\n    octx.putImageData(img, 0, 0);\n  }\n\n  function renderStrata(T, fx, fy) {\n    const cx = fx * W, cy = fy * H;\n    const czRx = W * 0.42;\n    const czRy = H * 0.32;\n\n    // traveling undulation: a slow wave across x that shifts every stratum's\n    // y-position by a few pixels. Continuously in motion.\n    const undK1  = 2 * Math.PI / W * 0.9;        // spatial frequency\n    const undPh1 = T * (2 * Math.PI / 18);       // 18s traversal\n    const undK2  = 2 * Math.PI / W * 2.3;\n    const undPh2 = T * (2 * Math.PI / 29);\n\n    const baseStep = Math.max(7, H / 85);\n    ctx.lineWidth = 1;\n    const SEG = 56;\n\n    let y = 4;\n    while (y < H - 4) {\n      const dyN = (y - cy) / czRy;\n      const vInZone = Math.max(0, 1 - dyN * dyN);\n      const localStep = baseStep * (1 - vInZone * 0.64);\n\n      for (let k = 0; k < SEG; k++) {\n        const xa = (k / SEG) * W;\n        const xb = ((k + 1) / SEG) * W;\n        const xMid = (xa + xb) / 2;\n\n        const ddx = (xMid - cx) / czRx;\n        const ddy = (y - cy) / czRy;\n        const dNorm = Math.sqrt(ddx * ddx + ddy * ddy);\n        const zoneLift = Math.max(0, 1 - dNorm);\n        const zl2 = zoneLift * zoneLift;\n\n        // ambient undulation — visible ripple across the whole field\n        const ambAmp = 2.8 + zl2 * 3.2;\n        const und = Math.sin(xMid * undK1 + undPh1 + y * 0.004) * ambAmp\n                  + Math.sin(xMid * undK2 + undPh2) * (ambAmp * 0.55)\n                  + Math.sin(y * 0.03 + T * 0.9) * 0.9;\n\n        // compression bend toward focal center\n        const bendMag = zl2 * 18 * Math.sign(cy - y);\n        const fall = sideFalloff(xMid, cx, czRx);\n        const yaBend = y + bendMag * sideFalloff(xa, cx, czRx) + und;\n        const ybBend = y + bendMag * sideFalloff(xb, cx, czRx) + und;\n\n        let op = 0.022 + zl2 * 0.58;\n        if (op < 0.028) continue;\n\n        const rC = 216 + (178 - 216) * zl2;\n        const gC = 212 + (128 - 212) * zl2;\n        const bC = 203 + (82 - 203) * zl2;\n\n        ctx.strokeStyle = `rgba(${Math.round(rC)},${Math.round(gC)},${Math.round(bC)},${op.toFixed(3)})`;\n        ctx.beginPath();\n        ctx.moveTo(xa, yaBend);\n        ctx.lineTo(xb, ybBend);\n        ctx.stroke();\n      }\n\n      y += localStep;\n    }\n  }\n\n  function sideFalloff(x, cx, rx) {\n    const d = Math.abs(x - cx) / rx;\n    const f = Math.max(0, 1 - d * d);\n    return f;\n  }\n\n  function renderFocalWarmth(T, fx, fy) {\n    const cx = fx * W, cy = fy * H;\n    // two overlapping pulses on different periods — the bloom breathes\n    const b1 = 0.75 + 0.25 * (0.5 + 0.5 * Math.sin(T * 2 * Math.PI / 11));\n    const b2 = 0.80 + 0.20 * (0.5 + 0.5 * Math.sin(T * 2 * Math.PI / 19 + 1.3));\n    const breath = (b1 * 0.6 + b2 * 0.4);\n    const r = Math.max(W, H) * 0.52;\n\n    const g = ctx.createRadialGradient(cx, cy, r * 0.03, cx, cy, r);\n    g.addColorStop(0,    `rgba(162, 108, 72, ${(0.18 * breath).toFixed(3)})`);\n    g.addColorStop(0.22, `rgba(118, 78, 52, ${(0.10 * breath).toFixed(3)})`);\n    g.addColorStop(0.50, `rgba(70, 46, 30, ${(0.040 * breath).toFixed(3)})`);\n    g.addColorStop(1,    'rgba(0,0,0,0)');\n\n    ctx.save();\n    ctx.globalCompositeOperation = 'screen';\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, W, H);\n    ctx.restore();\n  }\n\n  function renderFocalGesture(T, fx, fy) {\n    // THE BRANDED GESTURE: a vertical brass seam passing through the\n    // focal center, perpendicular to the horizontal strata. The intersection\n    // of the seam with the compression zone forms an implicit crosshair\n    // — the center of gravity of the whole composition.\n    //\n    // The seam itself breathes on its own ~13s cycle (independent of focal\n    // drift and warmth breath), so there is always motion somewhere.\n\n    const cx = fx * W, cy = fy * H;\n    const seamBreath = 0.55 + 0.45 * (0.5 + 0.5 * Math.sin(T * 2 * Math.PI / 13));\n\n    // vertical brass seam — soft at top and bottom, brightest near cy\n    const grad = ctx.createLinearGradient(cx, 0, cx, H);\n    const cyN = cy / H;\n    const r = 0.42;  // seam reaches ~42% of H up/down from center\n    const topFade    = Math.max(0, cyN - r);\n    const topEmerge  = Math.max(0, cyN - r * 0.6);\n    const bottomEmerge = Math.min(1, cyN + r * 0.6);\n    const bottomFade   = Math.min(1, cyN + r);\n\n    grad.addColorStop(0,              'rgba(202,163,112, 0)');\n    grad.addColorStop(topFade,        'rgba(202,163,112, 0)');\n    grad.addColorStop(topEmerge,      `rgba(202,163,112, ${(0.22 * seamBreath).toFixed(3)})`);\n    grad.addColorStop(cyN,            `rgba(232, 190, 134, ${(0.78 * seamBreath).toFixed(3)})`);\n    grad.addColorStop(bottomEmerge,   `rgba(202,163,112, ${(0.22 * seamBreath).toFixed(3)})`);\n    grad.addColorStop(bottomFade,     'rgba(202,163,112, 0)');\n    grad.addColorStop(1,              'rgba(202,163,112, 0)');\n\n    ctx.strokeStyle = grad;\n    ctx.lineWidth = 1;\n    ctx.beginPath();\n    ctx.moveTo(cx, 0);\n    ctx.lineTo(cx, H);\n    ctx.stroke();\n\n    // soft bronze bloom on the seam at the center — makes the intersection\n    // feel like it's under active pressure rather than a drawn line\n    const bloom = ctx.createRadialGradient(cx, cy, 2, cx, cy, Math.max(W, H) * 0.12);\n    bloom.addColorStop(0,    `rgba(240, 196, 140, ${(0.28 * seamBreath).toFixed(3)})`);\n    bloom.addColorStop(0.35, `rgba(200, 144, 92, ${(0.08 * seamBreath).toFixed(3)})`);\n    bloom.addColorStop(1,    'rgba(0,0,0,0)');\n    ctx.save();\n    ctx.globalCompositeOperation = 'screen';\n    ctx.fillStyle = bloom;\n    ctx.fillRect(0, 0, W, H);\n    ctx.restore();\n  }\n\n  let lastT = performance.now();\n  let t0 = lastT;\n\n  function frame(now) {\n    if (!running) return;\n    const T = (now - t0) / 1000;\n    const dt = Math.min(0.05, (now - lastT) / 1000);\n    lastT = now;\n\n    const k = 1 - Math.exp(-dt * 0.9);\n    pX += (tPX - pX) * k;\n    pY += (tPY - pY) * k;\n\n    const { fx, fy } = focalCenter(T);\n    const { sx, sy } = secondaryCenter(T);\n\n    renderBase(T, fx, fy, sx, sy);\n    ctx.imageSmoothingEnabled = true;\n    ctx.imageSmoothingQuality = 'high';\n    ctx.drawImage(off, 0, 0, W, H);\n\n    renderStrata(T, fx, fy);\n    renderFocalWarmth(T, fx, fy);\n    renderFocalGesture(T, fx, fy);\n\n    requestAnimationFrame(frame);\n  }\n\n  if (reduceMotion) {\n    const { fx, fy } = focalCenter(0);\n    const { sx, sy } = secondaryCenter(0);\n    renderBase(0, fx, fy, sx, sy);\n    ctx.drawImage(off, 0, 0, W, H);\n    renderStrata(0, fx, fy);\n    renderFocalWarmth(0, fx, fy);\n    renderFocalGesture(0, fx, fy);\n  } else {\n    requestAnimationFrame(frame);\n  }\n})();\n\n\n\n\n\n(() => {\n  const form = document.getElementById('signin');\n  const verb = form.querySelector('.submit .verb');\n  form.addEventListener('submit', (e) => {\n    e.preventDefault();\n    const o = verb.textContent;\n    verb.textContent = 'signing in';\n    setTimeout(() => window.location.href = 'https://test.wrought.dev', 250);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
